<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godber</title>
    <style>
    body {
        background-color: #1a1a1a;
        color: #f4f4f4;
        font-family: 'Inter', -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }

    .container {
        display: flex;
        flex-direction: column;
        /* THIS IS THE KEY: Adjust this number to change the gap between ALL items */
        gap: 1.5rem; 
        max-width: 600px;
        padding: 20px;
    }

    /* This strips away all the hidden "unequal" spacing browsers add by default */
    h1, p, a {
        margin: 0 !important;
        padding: 0 !important;
        line-height: 1.2;
    }

    h1 {
        font-weight: 300;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-size: 1.3rem;
    }

    p {
        font-size: 0.85rem;
        opacity: 0.6;
    }

    .link {
        color: #f4f4f4;
        text-decoration: none;
        border-bottom: 1px solid #444;
        padding-bottom: 2px;
        align-self: center;
        transition: border-color 0.3s ease;
    }

    .link:hover {
        border-bottom-color: #f4f4f4;
    }
</style>

<body>
    <div class="container">
        <h1>Amelia Godber</h1>
        <p>For more information, or to contact us, please visit</p>
        <a class="link" href="https://jamesgodber.com">jamesgodber.com</a>
        <p>and use the Contact link.</p>
    </div>
</body>
    <div class="container">
        <h1>Amelia Godber</h1> 
        
        <p>For more information, or to contact us, please visit</p>
        
        <div class="link-container">
            <a class="link" href="https://jamesgodber.com">jamesgodber.com</a>
            <p style="font-size: 0.8rem; opacity: 0.5;">and use the Contact link.</p>
        </div>
    </div>
</body>
</html>
