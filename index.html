<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godber</title>
    <style>
        body {
            background-color: #1a1a1a; /* Deep charcoal */
            color: #f4f4f4;           /* Off-white */
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .link {
            color: #f4f4f4;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            transition: border-color 0.3s ease;
        }
        .link:hover {
            border-bottom-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Amelia Godber</h1> 
        <p>For more information, please visit</p>
        <a class="link" href="https://jamesgodber.com">jamesgodber.com</a>
    </div>
</body>
</html>
