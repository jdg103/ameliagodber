<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amelia Godber</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f4f4f4;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            /* This is the only place spacing is controlled */
            display: flex;
            flex-direction: column;
            gap: 1.5rem; 
        }

        /* Removes all browser-default spacing from every line */
        h1, p, a {
            margin: 0 !important;
            padding: 0 !important;
            display: block;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 1.3rem;
        }

        p {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .link {
            color: #f4f4f4;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            width: fit-content;
            margin: 0 auto !important; /* Centers the link */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Amelia Godber</h1>
        <p>For more information, or to contact us, please visit</p>
        <a href="https://jamesgodber.com" class="link">jamesgodber.com</a>
        <p>and use the Contact link.</p>
    </div>

</body>
</html>
